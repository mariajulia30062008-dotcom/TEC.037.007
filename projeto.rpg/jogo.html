<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="card text-center">
            <div class="card-header">RPG: criado por Maria Júlia</div>
            <div class="card-body" id="tela" style="background-image: url('assets/fundo.gif'); background-size: cover;">
                <p class="card-text">Turno 1 </p>
                <div class="row">

                    <div class="col text-start" id="col-heroina">
                        <ul class="list-group float-start" style="width:300px;">
                            <li id="nome-heroina" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);color: rgb(255, 255, 255);">Astrid</li>
                            <li id="titulo-heroina" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">✨⚔️</li>
                            <li id="hp-heroina" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">❤️ <progress id="hp-hero" value="100"
                                    max="100" style="accent-color: red;"></progress></li>
                            <li id="mp-heroina" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">🧪 <progress id="mp-hero" value="100"
                                    max="100"></progress></li>
                            <li id="en-heroina" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">⚡ <progress id="en-hero" value="0" max="100"
                                    style="accent-color: orange;"></progress><br></li>
                        </ul>

                    </div>
                    <div class="col text-end" id="col-boss">
                        <ul class="list-group float-end" style="width: 300px;">
                            <li id="nome-boss" class="list-group-item" style="background-color: rgba(240, 248, 255, 0); color: rgb(255, 255, 255);">Water demon</li>
                            <li id="titulo-boss" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">👹💧</li>
                            <li id="hp-boss" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">🖤 <progress id="hp-boss" value="100" max="100" style="accent-color: red;"></progress></li>
                            <li id="en-boss" class="list-group-item" style="background-color: rgba(240, 248, 255, 0);">⚡ <progress id="en-boss" value="0" max="100" style="accent-color: orange;"></progress><br></li>
                        </ul>


                    </div>
                </div>
                <div class="row">
                    <div class="col text-end" id="col-botoes">
                        <div><img src="assets/heroinap.gif" width="400" height="400"></div>
                        <div class="btn-group" id="controles">
                        <button class="btn btn-info">ATTAQUE</button>
                        <button class="btn btn-info">SKILL</button>
                        <button class="btn btn-info">ULTIMATE</button>
                        </div>
                    </div>
                    
                    <div class="col text-start" id="col-msg">
                        <img src="assets/marvin-laguerre-aqua.gif" width="350" height="350">
                    </div>
                </div>
            </div>
            <div class=" card-footer"></div>
        </div>
    </div>
    </div>
</body>

</html>
